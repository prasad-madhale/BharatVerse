[pytest]
# Ensure the outer scrapper/ dir (for `scrapper.*` imports) and the repo
# root (for `common.*` imports) are both on sys.path regardless of which
# directory pytest is invoked from.
pythonpath = . ..
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (may make real API calls)
addopts = -v --tb=short --log-cli-level=INFO
log_cli = true
log_cli_format = %(levelname)s %(name)s: %(message)s
