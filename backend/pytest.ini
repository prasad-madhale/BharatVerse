[pytest]
# Pytest configuration for BharatVerse backend

# Ensure the repo root is on sys.path (for `backend.*` and `common.*` imports)
# regardless of which directory pytest is invoked from.
pythonpath = ..

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Asyncio configuration
asyncio_mode = auto

# Test paths
testpaths = tests

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Markers for different test types
markers =
    unit: Unit tests
    integration: Integration tests
    property: Property-based tests
    slow: Slow-running tests

# Coverage: enforced on every run, source-only (tests/ omitted via .coveragerc)
addopts = --cov=. --cov-config=.coveragerc --cov-report=term-missing --cov-fail-under=85
