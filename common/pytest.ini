[pytest]
# Ensure the repo root is on sys.path (for `common.*` imports) regardless
# of which directory pytest is invoked from.
pythonpath = ..
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
markers =
    unit: Unit tests

# Coverage: enforced on every run, source-only (tests/ omitted via .coveragerc)
addopts = --cov=. --cov-config=.coveragerc --cov-report=term-missing --cov-fail-under=85
